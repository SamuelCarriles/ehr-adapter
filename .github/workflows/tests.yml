name: Clojure CLI

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Install java
              uses: actions/setup-java@v4
              with:
                distribution: 'zulu'
                java-version: '17'

            - name: Install Clojure
              uses: DeLaGuardo/setup-clojure@12.5
              with:
                cli: latest  
            
            - name: Cache Deps
              uses: actions/cache@v4
              with:
                path: |
                    ~/.m2/repository
                    ~/.gitlibs
                    ~/.deps.edn
                key: ${{ runner.os }}-deps-${{ hashFiles('deps.edn') }}
                restore-keys: |
                    ${{ runner.os }}-deps-
                    
            - name: Run tests
              run: clojure -M:test
